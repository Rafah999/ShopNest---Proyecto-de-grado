{% extends "base.html" %}
{% block body_class %}register-page{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h2>Registro</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Registrarse</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a></p>
    </div>
</div>
{% endblock %}
