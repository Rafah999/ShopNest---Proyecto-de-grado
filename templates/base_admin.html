{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel Admin{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }
        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #333;
            width: 200px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
        }
        nav a {
            color: white;
            display: block;
            padding: 10px 15px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #555;
        }
        main {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Panel del Administrador</h1>
    </header>

    <nav>
        <a href="{% url 'dashboard' %}">🏠 Inicio</a>
        <a href="{% url 'usuarios_list' %}">👥 Usuarios</a>
        <li><a href="{% url 'solicitudes' %}">📥 Solicitudes</a></li>
        <a href="#">📊 Reportes</a>
        <a href="#">⚙️ Configuración</a>
        <a href="{% url 'logout' %}">🚪 Cerrar sesión</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
